name: PR Typecheck Diagnostic

on:
  pull_request:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run focused typecheck
        shell: bash
        run: |
          set -o pipefail
          git clone --quiet --depth=1 --branch "$GITHUB_HEAD_REF" "https://github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          corepack enable
          pnpm install --frozen-lockfile=false --reporter=silent
          pnpm typecheck
